# This workflow installs dependencies with Bun and runs the Bun test suite.

name: Bun CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
    - run: bun install --frozen-lockfile
    - run: bun test
